name: GearShop Auto-Pilot SEO

on:
  schedule:
    # Runs every 3 days at 02:00 AM UTC
    - cron: '0 2 */3 * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub website

jobs:
  update-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install openai

      - name: Run Auto-Pilot Bot
        run: python auto_pilot_seo.py
        env:
          # This should be added in your GitHub Repository Secrets later, but we use the one in the script for now
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GearShop AI Bot'
          git config --global user.email 'ai-bot@gearshop.ma'
          git add src/data/seo_trends.json
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-Pilot: New SEO Trend Generated"
          git push
