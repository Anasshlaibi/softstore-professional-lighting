name: GearShop SEO Automation

on:
  schedule:
    # Runs at 10:00 UTC (11:00 Moroccan time) on Monday, Wednesday, Friday
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:
    # Allows manual trigger for testing

jobs:
  generate-seo-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install openai schedule

      - name: Run SEO Bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python seo_automation_scheduler.py --run-once

      - name: Commit and Push new blogs
        run: |
          git config --global user.name "GearShop SEO Bot"
          git config --global user.email "seo-bot@gearshop.ma"
          git add blogs/*.md
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Auto-generated SEO blog" && git push)
